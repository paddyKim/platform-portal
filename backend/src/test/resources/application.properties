spring.application.name=platform-portal-api-test

server.port=0

spring.datasource.url=jdbc:h2:mem:platform_portal;MODE=MariaDB;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.open-in-view=false

management.endpoints.web.exposure.include=health,info,prometheus

portal.credentials.storage-secret=test-source-repository-credential-secret
