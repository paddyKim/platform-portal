spring.application.name=platform-portal-api

server.port=${SERVER_PORT:8081}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mariadb://localhost:3307/platform_portal}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:portal}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:portal}
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

management.endpoints.web.exposure.include=health,info,prometheus

portal.credentials.storage-secret=${PORTAL_CREDENTIAL_STORAGE_SECRET:local-development-credential-secret-change-me}
portal.cicd.base-url=${PORTAL_CICD_BASE_URL:http://localhost:8082}
